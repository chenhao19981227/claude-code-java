server:
  port: 8080

spring:
  application:
    name: claude-code-java
  datasource:
    url: jdbc:sqlite:${user.dir}/data/claude-code.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

claude:
  provider: glm
  api-key: 10e4a166382e4de69728e892aecc7861.bRIbRocQR2nf3Uii
  main-model: glm-5-turbo
  small-model: glm-5
  max-tokens: 65535
  temperature: 0.7
  base-url:
  skill-directories:
    - skills/
  mcp-servers:
    - name: mysql
      command: python
      args:
        - "mcp-servers/mysql/mcp_mysql_server.py"
      env:
        DB_HOST: localhost
        DB_PORT: "3306"
        DB_USER: root
        DB_PASSWORD: "123456"
        DB_NAME: "mysql"
  web-dir: web/
  # Hook configuration (Claude Code compatible)
  # Hooks are shell commands that run before/after tool execution
  # Exit code 0 = allow, exit code 2 = deny/block
  hooks:
    # PreToolUse: runs before a tool executes, can block the tool call
    # Example: block dangerous bash commands
    # PreToolUse:
    #   - matcher: "Bash"
    #     type: command
    #     command: "echo '{\"exit\": 0}'"  # always allow
    #     timeout: 30
    # PostToolUse: runs after a tool executes successfully
    # Example: auto-format after file edits
    # PostToolUse:
    #   - matcher: "Edit|Write"
    #     type: command
    #     command: "echo 'File modified'"
    #     timeout: 30
